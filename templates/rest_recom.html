<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Recommendation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("/static/bg.jpg"); /* Put your image in static folder */
      background-size: cover;
      background-position: center;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 400px;
    }

    h1 {
      color: #ffffff;
      font-weight: bold;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.9);
    }

    label {
      color: white;
      font-weight: bold;
    }

    select, input[type="file"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background-color: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }

    .secondary-btn {
      background-color: #007bff;
    }

    .secondary-btn:hover {
      background-color: #0056b3;
    }

    p {
      color: white;
    }

    input[type="checkbox"] {
      margin-right: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Restaurant Recommendation</h1>

  <form method="POST" action="/get_recommendations" enctype="multipart/form-data">

    <!-- Cuisine Dropdown -->
    <label for="cuisine">Select Cuisine:</label>
    <select name="cuisine" id="cuisine" required>
      {% for cuisine in cuisines %}
        <option value="{{ cuisine }}">{{ cuisine }}</option>
      {% endfor %}
    </select>

    <!-- Default Dish Checkbox -->
    <label>
      <input type="checkbox" id="use_default" name="use_default">
      Use Default Dish List
    </label>

    <br><br>

    <!-- Dish File Upload -->
    <label for="dish_file">Upload Dish List File:</label>
    <input type="file" id="dish_file" name="dish_file" accept=".txt">

    <button type="button" id="upload_button" class="secondary-btn">
      Load Dish List
    </button>

    <br><br>

    <!-- Dish Dropdown -->
    <label for="dish">Select Dish:</label>
    <select name="dish" id="dish_dropdown" required>
      <option value="">Select</option>
    </select>

    <br><br>

    <!-- Display Selections -->
    <p><strong>Selected Cuisine:</strong> <span id="selected_cuisine"></span></p>
    <p><strong>Selected Dish:</strong> <span id="selected_dish"></span></p>

    <br>

    <!-- Submit -->
    <button type="submit">Get Recommendations</button>

  </form>
</div>

<script>
  const dropdown = document.getElementById("dish_dropdown");

  // Show selected values
  document.getElementById("cuisine").addEventListener("change", function () {
    document.getElementById("selected_cuisine").textContent = this.value;
  });

  dropdown.addEventListener("change", function () {
    document.getElementById("selected_dish").textContent = this.value;
  });

  // Load dish list (default or upload)
  document.getElementById("upload_button").addEventListener("click", function () {

    const useDefault = document.getElementById("use_default").checked;
    dropdown.innerHTML = '<option value="">Select</option>'; // reset

    if (useDefault) {
      // Load default list
      fetch("/default_dish_list")
        .then(response => response.json())
        .then(data => {
          if (!data.dishes || data.dishes.length === 0) {
            alert("No dishes found in default list.");
            return;
          }

          alert("Default dish list loaded successfully!");

          data.dishes.forEach(dish => {
            const option = document.createElement("option");
            option.value = dish;
            option.textContent = dish;
            dropdown.appendChild(option);
          });
        })
        .catch(error => {
          console.error(error);
          alert("Error loading default dish list.");
        });

    } else {
      // Upload file
      const fileInput = document.getElementById("dish_file");

      if (!fileInput.files.length) {
        alert("Please select a dish file first.");
        return;
      }

      const formData = new FormData();
      formData.append("dish_file", fileInput.files[0]);

      fetch("/upload_dish_file", {
        method: "POST",
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if (!data.dishes || data.dishes.length === 0) {
          alert("No dishes found in uploaded file.");
          return;
        }

        alert("Dish file uploaded successfully!");

        data.dishes.forEach(dish => {
          const option = document.createElement("option");
          option.value = dish;
          option.textContent = dish;
          dropdown.appendChild(option);
        });
      })
      .catch(error => {
        console.error(error);
        alert("Error uploading file.");
      });
    }
  });
</script>

</body>
</html>
